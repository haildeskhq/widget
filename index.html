<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haildesk Widget — Local Dev</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 60px auto;
        padding: 0 24px;
        color: #111;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 8px;
      }
      p {
        color: #555;
        font-size: 0.9rem;
        margin: 4px 0;
      }
      code {
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.85rem;
      }
      .controls {
        margin-top: 32px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        padding: 8px 18px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
        font-size: 0.875rem;
      }
      button:hover {
        background: #f9fafb;
      }
    </style>
  </head>
  <body>
    <h1>Haildesk Widget — Local Dev</h1>
    <p>The widget bubble should appear in the bottom-right corner.</p>
    <p>
      API: <code>http://localhost:3001</code> &nbsp;|&nbsp; Widget dev server:
      <code>http://localhost:5174</code>
    </p>

    <div class="controls">
      <button onclick="window.Haildesk?.open()">Open widget</button>
      <button onclick="window.Haildesk?.close()">Close widget</button>
      <button onclick="window.Haildesk?.destroy()">Destroy widget</button>
    </div>

    <script>
      window.HaildeskConfig = {
        // Paste your API key here — generate one from the dashboard or via API
        apiKey:
          "f1a8829724ab627cb90689dd073d81709edb8a55c0572b88b836a3653e2d0724",
        apiUrl: "http://localhost:3001",
        // Optional: identify the customer
        // customerName: 'Test User',
        // customerEmail: 'test@example.com',
        // customerId: 'local-test-001',
      };
    </script>
    <script type="module" src="/src/widget.ts"></script>
  </body>
</html>
